<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ikram Cyber System | Master Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #030303; }
        .font-luxury { font-family: 'Playfair Display', serif; }
        .gold-text { background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); -webkit-background-clip: text; color: transparent; }
        .luxury-border { border: 1px solid rgba(212, 175, 55, 0.3); }
        .luxury-card { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(15px); transition: all 0.4s ease; }
        .luxury-card:hover { transform: translateY(-3px); background: rgba(15, 15, 15, 0.9); border-color: rgba(212, 175, 55, 0.6); box-shadow: 0 10px 30px rgba(212, 175, 55, 0.15); }
        .ambient-glow { position: fixed; width: 100vw; height: 100vh; background: radial-gradient(circle at 50% -10%, rgba(212,175,55,0.08) 0%, rgba(0,0,0,0) 60%); z-index: -1; top: 0; left: 0; pointer-events: none; }
        
        /* Fingerprint animation */
        @keyframes pulse-glow { 0%, 100% { opacity: 0.8; filter: drop-shadow(0 0 5px rgba(212,175,55,0.5)); } 50% { opacity: 1; filter: drop-shadow(0 0 15px rgba(212,175,55,0.8)); } }
        .icon-glow { animation: pulse-glow 3s infinite; }
    </style>
</head>
<body class="text-slate-300 antialiased pb-20 selection:bg-yellow-600/30 relative z-0 flex flex-col min-h-screen">
    <div class="ambient-glow"></div>
    
    <main class="max-w-md mx-auto px-6 pt-16 flex-1 w-full space-y-10">
        
        <div class="text-center space-y-4">
            <div class="w-20 h-20 mx-auto rounded-full border border-[#d4af37]/40 flex items-center justify-center bg-black/50 backdrop-blur-sm mb-6 relative">
                <div class="absolute inset-0 rounded-full border border-[#d4af37]/20 animate-ping opacity-20"></div>
                <i class="fas fa-fingerprint text-4xl gold-text icon-glow"></i>
            </div>
            
            <div class="inline-block border border-[#d4af37]/40 text-[#d4af37] text-[9px] font-bold px-6 py-2 rounded-full uppercase tracking-[0.3em] bg-black/50">
                Central Access Portal
            </div>
            
            <h1 class="font-luxury text-3xl font-bold tracking-tight text-white mt-4">
                Ikram <span class="gold-text italic">Cyber System</span>
            </h1>
            <p class="text-slate-400 text-xs font-light leading-relaxed tracking-wide">
                Digital Ecosystem & Premium Frequencies
            </p>
            <div class="w-12 h-[1px] bg-gradient-to-r from-transparent via-[#d4af37] to-transparent mx-auto mt-4"></div>
        </div>

        <div class="space-y-4 pt-4">
            
            <a href="https://ikram-cyber.github.io/audio-hub" class="flex items-center p-5 luxury-card luxury-border rounded-2xl group relative overflow-hidden">
                <div class="w-12 h-12 rounded-full bg-black/40 border border-white/10 flex items-center justify-center shrink-0 mr-4 group-hover:border-[#d4af37]/50 transition-colors">
                    <i class="fas fa-headphones-alt text-[#d4af37] text-lg"></i>
                </div>
                <div class="flex-1">
                    <h2 class="font-luxury text-white text-lg group-hover:text-[#fcf6ba] transition-colors">Premium Audio Hub</h2>
                    <p class="text-[9px] text-slate-400 font-light tracking-widest uppercase mt-1">Brainwave & Frequencies</p>
                </div>
                <i class="fas fa-chevron-right text-slate-600 text-xs group-hover:text-[#d4af37] transition-colors"></i>
            </a>

        </div>

    </main>

    <footer class="pt-12 pb-6 text-center mt-auto relative">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-24 h-[1px] bg-gradient-to-r from-transparent via-slate-700 to-transparent"></div>
        
        <div class="flex justify-center gap-8 mb-8">
            <a href="https://instagram.com/ikram_cyber" class="text-slate-500 hover:text-[#d4af37] transition-colors transform hover:scale-110"><i class="fab fa-instagram text-xl"></i></a>
            <a href="https://tiktok.com/@ikram_cyber" class="text-slate-500 hover:text-[#d4af37] transition-colors transform hover:scale-110"><i class="fab fa-tiktok text-xl"></i></a>
            <a href="https://wa.me/6282123436383" class="text-slate-500 hover:text-[#d4af37] transition-colors transform hover:scale-110"><i class="fab fa-whatsapp text-xl"></i></a>
        </div>
        
        <p class="text-[9px] text-slate-600 uppercase tracking-[0.4em] font-light">
            &copy; 2026 Ikram Cyber System
        </p>
    </footer>

</body>
</html>
